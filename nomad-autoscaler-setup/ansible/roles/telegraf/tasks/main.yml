---
- name: Install Telegraf dependencies
  ansible.builtin.apt:
    name:
      - wget
      - tar
      - curl
    state: present
    update_cache: true

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Ensure Telegraf group exists
  ansible.builtin.group:
    name: telegraf
    system: true

- name: Ensure Telegraf user exists
  ansible.builtin.user:
    name: telegraf
    group: telegraf
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Add telegraf user to docker group (for client nodes)
  ansible.builtin.user:
    name: telegraf
    groups: docker
    append: yes
  when: inventory_hostname in groups['nomad_clients']
  ignore_errors: true

- name: Ensure Telegraf directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop:
    - { path: "{{ telegraf_config_dir }}", owner: "telegraf", group: "telegraf" }
    - { path: "{{ telegraf_log_dir }}", owner: "telegraf", group: "telegraf" }

- name: Download Telegraf archive
  ansible.builtin.get_url:
    url: "{{ telegraf_tar_url }}"
    dest: "{{ telegraf_tar_tmp_path }}"
    mode: "0644"

- name: Extract Telegraf archive
  ansible.builtin.unarchive:
    src: "{{ telegraf_tar_tmp_path }}"
    dest: /tmp
    remote_src: true
    creates: "{{ telegraf_extract_dir }}"

- name: Install Telegraf binary
  ansible.builtin.copy:
    src: "{{ telegraf_extract_dir }}/telegraf"
    dest: /usr/local/bin/telegraf
    remote_src: true
    mode: "0755"

- name: Deploy Telegraf configuration
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_config_dir }}/telegraf.conf"
    owner: telegraf
    group: telegraf
    mode: "0644"
  notify: Restart telegraf

- name: Deploy Telegraf systemd unit
  ansible.builtin.template:
    src: telegraf.service.j2
    dest: /etc/systemd/system/telegraf.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart telegraf

- name: Ensure Telegraf service is enabled and started
  ansible.builtin.systemd:
    name: telegraf
    daemon_reload: true
    enabled: true
    state: started

- name: Remove temporary Telegraf artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ telegraf_tar_tmp_path }}"
    - "{{ telegraf_extract_dir }}"
