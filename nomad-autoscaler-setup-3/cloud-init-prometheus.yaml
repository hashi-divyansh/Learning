#cloud-config

# Cloud-init configuration for Prometheus monitoring VM
# This script runs inside the VM during first boot

package_update: true
package_upgrade: false

packages:
  - wget
  - unzip

write_files:
  - path: /etc/prometheus/prometheus.yml
    permissions: '0644'
    owner: root:root
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      # Alertmanager configuration
      alerting:
        alertmanagers:
          - static_configs:
              - targets: []

      scrape_configs:
        # Prometheus itself
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        # Nomad servers
        - job_name: 'nomad-servers'
          static_configs:
            - targets:
                - 'server-vm-0.orb.local:4646'
                - 'server-vm-1.orb.local:4646'
                - 'server-vm-2.orb.local:4646'
          metrics_path: '/v1/metrics'
          params:
            format: ['prometheus']

        # Nomad clients
        - job_name: 'nomad-clients'
          static_configs:
            - targets:
                - 'client-vm-0.orb.local:4646'
                - 'client-vm-1.orb.local:4646'
                - 'client-vm-2.orb.local:4646'
          metrics_path: '/v1/metrics'
          params:
            format: ['prometheus']

  - path: /etc/systemd/system/prometheus.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Prometheus
      Documentation=https://prometheus.io/docs/
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/var/lib/prometheus
      Restart=on-failure
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target


runcmd:
  # Fix DNS - OrbStack uses read-only symlink, must delete first
  - rm -f /etc/resolv.conf
  - echo "nameserver 1.1.1.1" > /etc/resolv.conf
  - echo "nameserver 8.8.8.8" >> /etc/resolv.conf
  # Create prometheus user and directories
  - useradd --no-create-home --shell /bin/false prometheus || true
  - mkdir -p /etc/prometheus
  - mkdir -p /var/lib/prometheus
  - chown prometheus:prometheus /etc/prometheus
  - chown prometheus:prometheus /var/lib/prometheus
  # Download and install Prometheus
  - cd /tmp
  - wget -q https://github.com/prometheus/prometheus/releases/download/v2.50.1/prometheus-2.50.1.linux-arm64.tar.gz
  - tar -xzf prometheus-2.50.1.linux-arm64.tar.gz
  - cp prometheus-2.50.1.linux-arm64/prometheus /usr/local/bin/
  - cp prometheus-2.50.1.linux-arm64/promtool /usr/local/bin/
  - chmod +x /usr/local/bin/prometheus /usr/local/bin/promtool
  - rm -rf prometheus-2.50.1.linux-arm64 prometheus-2.50.1.linux-arm64.tar.gz
  # Start Prometheus
  - systemctl daemon-reload
  - systemctl enable prometheus
  - systemctl start prometheus

final_message: "Prometheus monitoring setup completed after $UPTIME seconds"
